<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card</title>
    <link rel="stylesheet" href="card.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h1>Student Profile Card</h1>
            </div>
            <div class="card-body">
                <h3>MUhib Ullah</h3>
                <img src="images/std img.jpg" alt="student image" class="profile-image">
                <p class="bio">I am a full stack developer</p>
            </div>
            <div class="card-footer">
                <button class="btn-primary">View Profile</button>
            </div>
        </div>
    </div>
</body>
</html>
